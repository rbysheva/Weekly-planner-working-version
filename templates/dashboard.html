<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <style>
        body {
            background: #111827;
            color: #f3f4f6;
            font-family: "Trebuchet MS", sans-serif;

            display: flex;
            justify-content: center;
            padding-top: 50px;
        }

        .container {
            width: 800px;
            background: #1f2937;
            border: 3px solid #7c3aed;
            border-radius: 20px;
            padding: 30px;
            box-shadow:
                0 0 15px #7c3aed,
                0 0 30px rgba(124,58,237,0.3);
        }

        button {
            background: #7c3aed;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 10px;
            margin-top: 8px;
            cursor: pointer;
            transition: 0.3s;
        }
        
        button:hover {
            background: #9333ea;

            box-shadow: 0 0 10px #9333ea;
        }

        .buttons {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }

        .task-card {
            background: #374151;
            border-left: 5px solid #a855f7;
            border-radius: 12px;
            padding: 18px;
            margin: 15px auto;
            max-width: 500px;
            text-align: left;
        }

        .task-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 15px #9333ea;
        }

        h1 {
            text-align: center;
            color: #c084fc;
            font-size: 42px;
            text-shadow: 0 0 10px #7c3aed;
        }

        h2 {
            text-align: center;
        }

        .trainer-card {
            background: #111827;
            border: 2px solid #7c3aed;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 25px;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="container">

        <h1>🌙 Weekly Planner</h1>

        <div class="trainer-card">
            <h3>🎮 Trainer</h3>
            <p>{{ name }}</p>
            <br><br>
            Level {{ level }}
            <br>
            XP: {{ xp }}/100
        </div>

        <h2>Your Tasks</h2>

    {% if tasks %}

    {% for task in tasks %}

    <div class="task-card">
        ⚡ {{ task[0] }}
        <br>
        📅 {{ task[1] }}
        <br>
        {% if task[2] == "Completed" %}
        🟢 Completed
        {% else %}
        🟡 Pending
        {% endif %}
    </div>

    <div class="buttons">

        <form action="/edit-task/{{ task[0] }}" method="get">
             <input type="hidden" name="user_id" value="{{ user_id }}">
             <button type="submit">Edit</button>
        </form>

        <form action="/delete-task" method="post">
            <input type="hidden" name="title" value="{{ task[0] }}">
            <input type="hidden" name="user_id" value="{{ user_id }}">
            <button type="submit">Delete</button>
        </form>

        <form action="/complete-task" method="post">

            <input type="hidden" name="title" value="{{ task[0] }}">
            <input type="hidden" name="user_id" value="{{ user_id }}">

            <button type="submit">
                Complete Quest
            </button>

        </form>

    </div>
    {% endfor %}

    {% else %}

    <p>No tasks yet.</p>

    {% endif %}

        <a href="/add-task?user_id={{ user_id }}">
            <button>Add Task</button>
        </a>

    </div>
</body>
</html>
