<!DOCTYPE html>
<html>
<head>
    <title>Week Planner</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            text-align: center;
            padding-top: 100px;
        }

        .container {
            background: white;
            width: 500px;
            margin: auto;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }

        h1 {
            color: #2c3e50;
        }

        button {
            background: #3498db;
            color: white;
            border: none;
            padding: 12px 20px;
            margin: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #2980b9;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>📅 Week Planner</h1>

        <h2>Welcome!</h2>

        <p> Plan your week and track your progress.</p>

        <a href="/register">
        <button>Sign Up</button>
        </a>
        <a href="/login">
        <button>Login</button>
        </a>
    </div>
</body>
</html>
