<!DOCTYPE html>
<html>
<head>
    <title>Регистрация</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            text-align: center;
            padding-top: 100px;
        }

        .container {
            background: white;
            width: 400px;
            margin: auto;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }

        input {
            width: 90%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            background: #3498db;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #2980b9;
        }

        a {
            display: block;
            margin-top: 15px;
            text-decoration: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Create Account</h1>

        <form method="post" action="/register">
        <input type="text" name="name" placeholder="Name">

        <input type="email" name="email" placeholder="Email">

        <input type="password" name="password" placeholder="Password">

        <br><br>

        <button type="submit">
        Sign Up
        </button>
        </form>

        <a href="/">← Back to Home</a>
    </div>
</body>
</html>
